server {
    listen 443 ssl http2;
    server_name adbwg.example.com;

    # Ustaw wlasne certyfikaty.
    ssl_certificate /etc/letsencrypt/live/adbwg.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adbwg.example.com/privkey.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:5127;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
