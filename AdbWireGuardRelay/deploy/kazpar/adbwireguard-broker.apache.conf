# Przykladowy snippet dla Apache 2.4.
# Zaklada, ze broker nasluchuje lokalnie na 127.0.0.1:25127
# i ma byc wystawiony publicznie pod /adbwg/.

ProxyPreserveHost On

ProxyPassMatch ^/adbwg/ws/(.*)$ ws://127.0.0.1:25127/ws/$1 retry=0 timeout=3600
ProxyPass        /adbwg/ http://127.0.0.1:25127/ retry=0 timeout=60
ProxyPassReverse /adbwg/ http://127.0.0.1:25127/
